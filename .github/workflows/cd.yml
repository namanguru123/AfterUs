name: AfterUs CD

on:
  workflow_run:
    workflows: ["AfterUs CI"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/afterus-backend ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/afterus-backend

    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/afterus-frontend ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/afterus-frontend

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker rm -f afterus-backend afterus-frontend || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/afterus-backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/afterus-frontend

          docker network create afterus-network || true

          docker run -d \
            --name afterus-backend \
            --network afterus-network \
            --env-file backend.env \
            -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/afterus-backend

          docker run -d \
            --name afterus-frontend \
            --network afterus-network \
            -p 80:80 \
            ${{ secrets.DOCKER_USERNAME }}/afterus-frontend